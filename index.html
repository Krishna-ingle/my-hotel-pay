<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pay Krishna - Hotel Bill</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen font-sans">

    <div class="bg-white p-8 rounded-xl shadow-lg text-center max-w-sm w-full border-t-4 border-blue-600">

        <div class="w-12 h-12 rounded-full bg-blue-100 text-blue-700 font-bold text-lg flex items-center justify-center mx-auto mb-3">KI</div>
        <h2 class="text-xl font-bold text-slate-800 mb-1">Krishna Ingale</h2>
        <p class="text-slate-400 text-sm mb-5">Hotel Bill Payment</p>

        <!-- Amount Input -->
        <div class="mb-5 text-left">
            <label class="text-slate-500 text-sm mb-1 block">Enter Amount (₹)</label>
            <input type="number" id="amount" placeholder="e.g. 1500"
                class="w-full border border-slate-300 rounded-lg px-4 py-3 text-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
                oninput="updateQR()" />
        </div>

        <!-- QR Code Box -->
        <div class="bg-slate-50 rounded-xl p-4 mb-3 flex flex-col items-center">
            <div id="qrcode" class="mb-2"></div>
            <p class="text-xs text-slate-400">Scan with GPay / PhonePe / Paytm</p>
        </div>

        <!-- Pay Button -->
        <button onclick="payNow()"
            class="bg-blue-600 text-white font-bold py-3 px-6 rounded-lg w-full text-lg hover:bg-blue-700 transition-colors mb-3">
            Pay Now (UPI)
        </button>

        <p class="text-xs text-slate-400">UPI ID: 9579465525-2@ibl</p>
    </div>

    <script>
        const UPI_ID = "9579465525-2@ibl";
        const NAME = "Krishna%20Domababu%20Ingle";
        const NOTE = "Hotel%20Bill";
        let qrInstance = null;

        function getUpiUrl(amount) {
            let url = `upi://pay?pa=${UPI_ID}&pn=${NAME}&tn=${NOTE}&cu=INR`;
            if (amount && amount > 0) url += `&am=${amount}`;
            return url;
        }

        function updateQR() {
            const amount = document.getElementById('amount').value;
            const upiUrl = getUpiUrl(amount);
            const container = document.getElementById('qrcode');
            container.innerHTML = '';
            qrInstance = new QRCode(container, {
                text: upiUrl,
                width: 160,
                height: 160,
            });
        }

        function payNow() {
            const amount = document.getElementById('amount').value;
            if (!amount || amount <= 0) {
                alert('Please enter a valid amount');
                return;
            }
            window.location.href = getUpiUrl(amount);
        }

        // Generate QR on load with no amount
        updateQR();
    </script>
</body>
</html>
