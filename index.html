<!DOCTYPE html>
<html>
<head>
    <title>Redirecting to Payment...</title>
    <script>
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const pa = urlParams.get('pa');
            const pn = urlParams.get('pn');
            const am = urlParams.get('am');
            const mc = urlParams.get('mc'); // Grab the new merchant code

            if(pa && pn && am) {
                // Add &mc= to the final string if it exists
                let finalLink = `upi://pay?pa=${pa}&pn=${pn}&am=${am}&cu=INR`;
                if (mc) {
                    finalLink += `&mc=${mc}`;
                }
                window.location.href = finalLink;
            }
        }
    </script>
</head>
<body style="text-align: center; margin-top: 50px; font-family: sans-serif;">
    <h2>Opening Payment Apps...</h2>
    <p>Please select GPay, PhonePe, or Paytm from the popup.</p>
</body>
</html>
