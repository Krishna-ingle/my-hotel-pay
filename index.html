<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pay Krishna - Hotel Bill</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen font-sans">

    <div class="bg-white p-8 rounded-xl shadow-lg text-center max-w-sm w-full border-t-4 border-blue-600">
        <h2 class="text-2xl font-bold text-slate-800 mb-1">Hotel Bill Payment</h2>
        <p class="text-slate-500 text-sm mb-6">Pay Krishna Domababu Ingle</p>

        <div class="mb-5 text-left">
            <label class="text-slate-600 text-sm font-medium mb-1 block">Enter Amount (₹)</label>
            <input type="number" id="amount" placeholder="e.g. 1500"
                class="w-full border border-slate-300 rounded-lg px-4 py-3 text-lg focus:outline-none focus:ring-2 focus:ring-blue-400" />
        </div>

        <button onclick="payNow()"
            class="bg-blue-600 text-white font-bold py-3 px-6 rounded-lg w-full text-lg hover:bg-blue-700 transition-colors">
            Pay Now (UPI)
        </button>

        <p class="text-xs text-slate-400 mt-4">UPI ID: 9579465525@pthdfc</p>
    </div>

    <script>
        function payNow() {
            const amount = document.getElementById('amount').value;
            if (!amount || amount <= 0) {
                alert('Please enter a valid amount');
                return;
            }
            const upiUrl = `upi://pay?pa=9579465525@pthdfc&pn=Krishna%20Domababu%20Ingle&tn=Hotel%20Bill&am=${amount}&cu=INR`;
            window.location.href = upiUrl;
        }
    </script>
</body>
</html>
