<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Payment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        window.onload = function() {
            // Krishna's exact UPI string
            const upiUrl = "upi://pay?pa=9579465525@pthdfc&pn=Krishna%20Domababu%20Ingle&tn=Hotel%20Bill&cu=INR";
            
            // Attempt to auto-open the app selector immediately
            window.location.href = upiUrl;
            
            // Fallback button if auto-redirect gets blocked by the browser
            setTimeout(function() {
                document.getElementById('fallback').style.display = 'block';
            }, 2500);
        };
    </script>
</head>
<body class="bg-slate-100 flex items-center justify-center h-screen font-sans">

    <div class="bg-white p-8 rounded-xl shadow-lg text-center max-w-sm w-full border-t-4 border-blue-600">
        <h2 class="text-2xl font-bold text-slate-800 mb-2">Opening Secure Payment...</h2>
        <p class="text-slate-500 mb-6 text-sm">Please wait while we safely connect to your installed payment apps (GPay, PhonePe, Paytm).</p>
        
        <div id="fallback" style="display: none;">
            <p class="text-slate-700 mb-4 font-medium">If the prompt didn't appear automatically, tap the button below:</p>
            <a href="upi://pay?pa=9579465525@pthdfc&pn=Krishna%20Domababu%20Ingle&tn=Hotel%20Bill&cu=INR" 
               class="bg-blue-600 text-white font-bold py-3 px-6 rounded-lg shadow-md hover:bg-blue-700 w-full block transition-colors">
                Pay Krishna Now
            </a>
        </div>
    </div>

</body>
</html>
